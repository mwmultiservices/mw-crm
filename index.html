<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MW Multiservices CRM</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
:root{
  --bg:#0f1117;--s1:#161b26;--s2:#1e2536;--s3:#263044;
  --teal:#69C9CA;--td:#3aafb0;--tl:rgba(105,201,202,.12);

  --tx:#f1f5f9;--tx2:#cbd5e1;--tx3:#94a3b8;--tx4:#64748b;

*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',system-ui,sans-serif;background:var(--bg);color:var(--tx);min-height:100vh}
.splash{position:fixed;inset:0;z-index:1000;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center}
.splash.hide{animation:splashOut .5s ease forwards;pointer-events:none}

.sp-logo{display:flex;flex-direction:column;align-items:center;gap:14px;animation:fadeUp .7s cubic-bezier(.22,1,.36,1) forwards;opacity:0}

.sp-word{font-size:22px;font-weight:800;color:var(--tx)}.sp-word span{color:var(--teal)}
.sp-badge{margin-top:4px;padding:4px 16px;border-radius:20px;font-size:12px;font-weight:700;border:0.5px solid rgba(105,201,202,.3);color:var(--teal);background:rgba(105,201,202,.08);animation:fadeUp .7s .15s cubic-bezier(.22,1,.36,1) forwards;opacity:0}
.sp-bar-w{width:160px;margin-top:26px;animation:fadeUp .6s .25s cubic-bezier(.22,1,.36,1) forwards;opacity:0}

.sp-bar-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--teal),var(--ol));width:0%;transition:width 1.2s cubic-bezier(.4,0,.2,1)}
.sp-greet{margin-top:12px;font-size:13px;font-weight:600;color:var(--tx4);animation:fadeUp .6s .35s cubic-bezier(.22,1,.36,1) forwards;opacity:0}
.pg-enter{animation:pgIn .4s cubic-bezier(.22,1,.36,1)}
@keyframes pgIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.ni-s{animation:niIn .35s cubic-bezier(.22,1,.36,1) both}
@keyframes niIn{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}
.pop{animation:cardPop .45s cubic-bezier(.22,1,.36,1) both}

.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;background:radial-gradient(ellipse at 30% 20%,rgba(105,201,202,.08) 0%,transparent 60%),var(--bg)}
.lb{width:340px}
.ll{display:flex;align-items:center;gap:10px;margin-bottom:22px;justify-content:center}
.ll-txt{font-size:17px;font-weight:700;color:var(--tx)}.ll-txt span{color:var(--teal)}
.lc{background:var(--s1);border:0.5px solid var(--bd2);border-radius:var(--r);padding:24px}
.lg{font-size:19px;font-weight:700;margin-bottom:3px}
.ls2{font-size:12px;color:var(--tx4);margin-bottom:18px}
.lf{margin-bottom:11px}
.lf label{font-size:11px;color:var(--tx3);display:block;margin-bottom:3px;font-weight:500;text-transform:uppercase;letter-spacing:.04em}
.lf input{width:100%;height:39px;font-size:13px;background:var(--bg);border:1px solid var(--bd2);border-radius:var(--rm);color:var(--tx);padding:0 12px;transition:border-color .15s}
.lf input:focus{outline:none;border-color:var(--teal);box-shadow:0 0 0 3px rgba(105,201,202,.1)}
.lbtn{width:100%;height:41px;background:var(--teal);border:none;border-radius:var(--rm);font-size:14px;font-weight:700;color:#0a1628;cursor:pointer;margin-top:5px;transition:all .15s}
.lbtn:hover{background:var(--td);transform:translateY(-1px)}
.lerr{font-size:12px;color:var(--red);text-align:center;margin-top:7px;min-height:16px}
.ld{margin-top:14px;padding-top:12px;border-top:0.5px solid var(--bd)}
.ld-lbl{font-size:10px;color:var(--tx4);margin-bottom:7px;text-transform:uppercase;letter-spacing:.06em;font-weight:600}
.demo-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px;max-height:220px;overflow-y:auto}
.da{display:flex;align-items:center;gap:6px;padding:7px 9px;border-radius:var(--rm);cursor:pointer;border:0.5px solid var(--bd);transition:all .15s}
.da:hover{border-color:var(--teal);background:var(--tl)}
.da-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.da-name{font-size:11px;font-weight:600;color:var(--tx2)}
.da-role{font-size:9px;color:var(--tx4)}
.app-shell{display:flex;flex-direction:column;min-height:100vh}
.tb{height:50px;background:var(--s1);border-bottom:0.5px solid var(--bd);display:flex;align-items:center;padding:0 14px;gap:10px;flex-shrink:0;position:sticky;top:0;z-index:100}
.tb-logo-t{font-size:13px;font-weight:700;color:var(--tx)}.tb-logo-t span{color:var(--teal)}
.tb-sp{flex:1}
.tb-date{font-size:11px;color:var(--tx4);font-weight:500}
.tb-av{width:27px;height:27px;border-radius:50%;background:var(--teal);color:#0a1628;font-size:10px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.tb-name{font-size:12px;font-weight:600;color:var(--tx2)}
.rb{font-size:10px;padding:2px 7px;border-radius:20px;font-weight:700}
.rp{background:rgba(105,201,202,.15);color:var(--teal)}
.rl{background:rgba(58,175,176,.12);color:var(--td)}
.rr{background:rgba(138,148,69,.15);color:var(--ol)}
.rt{background:rgba(105,112,53,.12);color:var(--ol)}
.rte{background:rgba(59,130,246,.12);color:var(--blue)}

.layout{display:flex;flex:1}
.sidebar{width:188px;background:var(--s1);border-right:0.5px solid var(--bd);padding:8px 5px;flex-shrink:0;overflow-y:auto;min-height:calc(100vh - 50px)}

.ni{display:flex;align-items:center;gap:7px;padding:7px 9px;border-radius:var(--rm);cursor:pointer;font-size:12px;color:var(--tx3);margin:1px 0;transition:all .15s;font-weight:500;user-select:none}
.ni:hover{background:var(--s2);color:var(--tx2)}
.ni.act{background:var(--tl);color:var(--teal);font-weight:700;border:0.5px solid rgba(105,201,202,.18)}
.content{flex:1;overflow-y:auto;padding:18px;background:var(--bg)}
.ph{margin-bottom:16px}
.ph-g{font-size:12px;color:var(--tx4);font-weight:500;margin-bottom:2px}
.ph-t{font-size:23px;font-weight:800;letter-spacing:-.6px}
.card{background:var(--s1);border:0.5px solid var(--bd2);border-radius:var(--r);padding:13px 15px;margin-bottom:10px}
.card-t{font-size:12px;font-weight:700;color:var(--tx2);margin-bottom:9px;display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}
.two{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.three{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px}
.four{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px}
.sc{background:var(--s1);border:0.5px solid var(--bd2);border-radius:var(--r);padding:11px 13px}
.sc-l{font-size:10px;color:var(--tx4);font-weight:600;margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em}
.sc-v{font-size:19px;font-weight:800;letter-spacing:-.4px}
.b{display:inline-flex;align-items:center;font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px}
.bt{background:rgba(105,201,202,.15);color:var(--td)}.bo{background:rgba(138,148,69,.15);color:var(--ol)}
.bg{background:rgba(34,197,94,.15);color:var(--green)}.ba{background:rgba(245,158,11,.15);color:var(--amber)}
.br{background:rgba(239,68,68,.15);color:var(--red)}.bx{background:var(--s3);color:var(--tx3);border:0.5px solid var(--bd2)}
.tr{display:grid;align-items:center;padding:8px 0;border-bottom:0.5px solid var(--bd);font-size:12px;gap:6px}
.tr:last-child{border-bottom:none}
.trh{font-size:10px;color:var(--tx4);font-weight:700;text-transform:uppercase;letter-spacing:.04em}
.tn{font-weight:600;color:var(--tx)}.tsm{font-size:10px;color:var(--tx4);margin-top:1px}
.tabs{display:flex;gap:2px;margin-bottom:12px;border-bottom:0.5px solid var(--bd);overflow-x:auto}
.tab{padding:7px 12px;font-size:12px;cursor:pointer;color:var(--tx4);border-bottom:2px solid transparent;margin-bottom:-1px;font-weight:500;transition:all .15s;white-space:nowrap;flex-shrink:0}
.tab.act{color:var(--teal);border-bottom-color:var(--teal);font-weight:700}
.fld{margin-bottom:9px}
.fld label{font-size:11px;color:var(--tx4);display:block;margin-bottom:3px;font-weight:600;text-transform:uppercase;letter-spacing:.04em}
.fld input,.fld select,.fld textarea{width:100%;font-size:12px;background:var(--bg);border:1px solid var(--bd2);border-radius:var(--rm);color:var(--tx);padding:7px 11px;height:36px;transition:border-color .15s}
.fld input:focus,.fld select:focus{outline:none;border-color:var(--teal)}
.fld textarea{height:50px;resize:none}
.btn-t{background:var(--teal);border:none;border-radius:var(--rm);padding:8px 14px;font-size:12px;font-weight:700;color:#0a1628;cursor:pointer;transition:all .15s}
.btn-t:hover{background:var(--td);transform:translateY(-1px)}
.btn-o{background:var(--olive);border:none;border-radius:var(--rm);padding:8px 14px;font-size:12px;font-weight:700;color:white;cursor:pointer}
.btn-w{background:transparent;border:0.5px solid var(--bd2);border-radius:var(--rm);padding:8px 14px;font-size:12px;font-weight:600;color:var(--tx3);cursor:pointer}
.btn-pay{border:none;border-radius:var(--rm);padding:6px 12px;font-size:11px;font-weight:700;cursor:pointer;transition:all .3s}
.btn-pay.unpaid{background:rgba(245,158,11,.15);color:var(--amber);border:0.5px solid rgba(245,158,11,.3)}
.btn-pay.paid{background:rgba(34,197,94,.15);color:var(--green);border:0.5px solid rgba(34,197,94,.3)}
.pipe-board{display:flex;gap:8px;overflow-x:auto;padding-bottom:8px;min-height:360px}
.pipe-col{flex:0 0 155px;background:var(--s1);border:0.5px solid var(--bd2);border-radius:var(--r);display:flex;flex-direction:column;max-height:500px}
.pipe-col-h{padding:8px 11px;border-bottom:0.5px solid var(--bd);flex-shrink:0;border-top:3px solid}
.pct{font-size:9px;font-weight:800;color:var(--tx3);text-transform:uppercase;letter-spacing:.04em;display:flex;justify-content:space-between;align-items:center}
.pcn{background:var(--s3);color:var(--tx3);font-size:9px;font-weight:700;padding:1px 5px;border-radius:20px}
.pcv{font-size:12px;font-weight:700;margin-top:3px}
.pipe-cards{flex:1;overflow-y:auto;padding:7px}
.pc{background:var(--s2);border:0.5px solid var(--bd2);border-radius:var(--rm);padding:8px 9px;margin-bottom:5px;cursor:pointer;transition:all .15s}
.pc:hover{border-color:var(--teal);transform:translateY(-1px)}
.pc.asel{border-color:var(--teal);background:var(--tl)}
.pc-n{font-size:11px;font-weight:700}
.pc-s{font-size:9px;color:var(--tx4);margin-top:2px}
.pc-p{font-size:10px;font-weight:700;color:var(--teal);margin-top:2px}
.pipe-sms{display:grid;grid-template-columns:1fr 280px;gap:12px;min-height:460px}
.sms-panel{background:var(--s1);border:0.5px solid var(--bd2);border-radius:var(--r);display:flex;flex-direction:column;height:460px}
.sms-ph{padding:12px 14px;border-bottom:0.5px solid var(--bd);flex-shrink:0}
.sms-abtns{display:flex;flex-wrap:wrap;gap:4px;padding:8px 12px;border-bottom:0.5px solid var(--bd);flex-shrink:0}
.sms-ab{padding:4px 8px;border-radius:var(--rs);font-size:10px;font-weight:700;cursor:pointer;border:none}
.sms-empty{display:flex;align-items:center;justify-content:center;flex:1;font-size:12px;color:var(--tx4);text-align:center;padding:20px}
.sms-thread{flex:1;overflow-y:auto;padding:10px}
.sms-msg{margin-bottom:6px;display:flex;flex-direction:column}
.sms-msg.out{align-items:flex-end}.sms-msg.in{align-items:flex-start}
.sms-bubble{padding:7px 10px;border-radius:9px;font-size:11px;max-width:85%;line-height:1.4}
.sms-bubble.out{background:var(--teal);color:#0a1628;border-bottom-right-radius:3px}
.sms-bubble.in{background:var(--s3);color:var(--tx2);border-bottom-left-radius:3px}
.sms-time{font-size:9px;color:var(--tx4);margin-top:1px}
.sms-ia{padding:8px;border-top:0.5px solid var(--bd);flex-shrink:0;display:flex;gap:6px}
.sms-ia input{flex:1;height:32px;font-size:12px;background:var(--bg);border:1px solid var(--bd2);border-radius:var(--rm);color:var(--tx);padding:0 10px}
.sms-ia input:focus{outline:none;border-color:var(--teal)}
.sms-send{background:var(--teal);border:none;border-radius:var(--rm);padding:0 12px;height:32px;font-size:11px;font-weight:700;color:#0a1628;cursor:pointer}
.pay-emp-row{background:var(--s2);border:0.5px solid var(--bd2);border-radius:var(--rm);margin-bottom:8px;overflow:hidden}
.pay-emp-h{display:grid;grid-template-columns:1fr 70px 65px 75px 75px 70px;gap:6px;align-items:center;padding:11px 13px;cursor:pointer;transition:background .15s;font-size:12px}
.pay-emp-h:hover{background:var(--s3)}
.pay-emp-d{padding:0 13px 12px;border-top:0.5px solid var(--bd);display:none}
.pay-emp-d.open{display:block}
.pay-day-r{display:grid;grid-template-columns:80px 55px 55px 1fr 65px;gap:8px;padding:7px 0;border-bottom:0.5px solid var(--bd);font-size:11px;align-items:center}
.pay-day-r:last-child{border-bottom:none}
.cs{background:var(--s1);border:0.5px solid var(--bd2);border-radius:var(--r);padding:14px;margin-bottom:12px}
.ctr{display:grid;grid-template-columns:1fr 40px 62px 65px 65px 72px;gap:6px;align-items:center;padding:8px 0;border-bottom:0.5px solid var(--bd);font-size:12px}
.ctr:last-child{border-bottom:none}
.crr{display:grid;grid-template-columns:1fr 65px 50px 70px 65px 72px;gap:6px;align-items:center;padding:8px 0;border-bottom:0.5px solid var(--bd);font-size:12px}
.crr:last-child{border-bottom:none}
.clock-hero{background:var(--s1);border:0.5px solid var(--bd2);border-radius:var(--r);padding:28px;text-align:center;margin-bottom:14px;position:relative;overflow:hidden}
.clock-hero::before{content:'';position:absolute;top:-40px;left:50%;transform:translateX(-50%);width:200px;height:200px;background:radial-gradient(circle,rgba(105,112,53,.15) 0%,transparent 70%);pointer-events:none}
.clock-time{font-size:52px;font-weight:800;letter-spacing:-.5px;margin-bottom:3px;font-variant-numeric:tabular-nums}
.clock-date{font-size:13px;color:var(--tx4);margin-bottom:20px}
.clock-status{font-size:13px;font-weight:600;margin-bottom:18px;min-height:18px}
.clock-btns{display:flex;gap:10px;justify-content:center}
.btn-cin{background:var(--ol);border:none;border-radius:var(--rm);padding:13px 28px;font-size:14px;font-weight:800;color:white;cursor:pointer;transition:all .15s}
.btn-cin:hover{background:var(--olive);transform:translateY(-1px)}
.btn-cout{background:var(--s3);border:1px solid var(--bd2);border-radius:var(--rm);padding:13px 28px;font-size:14px;font-weight:800;color:var(--tx2);cursor:pointer}
.ts-row{display:grid;grid-template-columns:80px 60px 60px 1fr 75px;gap:8px;padding:8px 0;border-bottom:0.5px solid var(--bd);align-items:center;font-size:12px}
.ts-row:last-child{border-bottom:none}
.ts-total{background:var(--tl);border-radius:var(--rm);padding:12px 14px;display:flex;justify-content:space-between;align-items:center;margin-top:10px;border:0.5px solid rgba(105,201,202,.15)}
.plan-card{background:var(--s2);border:0.5px solid var(--bd2);border-radius:var(--rm);padding:9px 11px;cursor:pointer;transition:all .15s;margin-bottom:5px}
.plan-card.sel{border-color:var(--teal);background:rgba(105,201,202,.06)}
.cl-row{display:grid;align-items:center;padding:9px 12px;border-radius:var(--rm);margin-bottom:4px;background:var(--s2);cursor:pointer;transition:all .15s;font-size:12px;gap:8px}
.cl-row:hover{background:var(--s3)}
.cl-av{width:30px;height:30px;border-radius:50%;background:var(--tl);color:var(--teal);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.chip-sel{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px}
.chip{display:inline-flex;align-items:center;gap:3px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;border:0.5px solid var(--bd2);transition:all .15s;user-select:none}
.chip.on{background:var(--teal);color:#0a1628;border-color:var(--teal)}
.chip:not(.on){background:var(--s2);color:var(--tx3)}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(4px)}
.mod{background:var(--s1);border:0.5px solid var(--bd2);border-radius:var(--r);padding:20px;width:400px;max-height:88vh;overflow-y:auto}
.mod-t{font-size:15px;font-weight:800;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center}
.mod-c{cursor:pointer;color:var(--tx4);font-size:20px;line-height:1}
.toast-n{position:fixed;bottom:20px;right:20px;background:rgba(34,197,94,.15);border:0.5px solid rgba(34,197,94,.3);color:var(--green);padding:9px 14px;border-radius:var(--rm);font-size:12px;font-weight:700;z-index:300;animation:pgIn .3s ease}
@media(max-width:768px){.sidebar{width:60px}.sb-sec{display:none}.ni span:last-child{display:none}.ni{justify-content:center;padding:10px}.two{grid-template-columns:1fr}.four{grid-template-columns:1fr 1fr}.pipe-sms{grid-template-columns:1fr}.sms-panel{height:300px}}

<div id="root"></div>
